<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" role="img" aria-label="DJ Loves Me">
  <defs>
    <linearGradient id="dlm-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="dlm-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="dlm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pill with gradient border -->
  <rect x="5" y="5" width="470" height="130" rx="65" ry="65"
        fill="#000" stroke="url(#dlm-grad)" stroke-width="6"/>

  <!-- Audio waveform bars (behind text) -->
  <g fill="url(#dlm-gold)" filter="url(#dlm-glow)">
    <rect x="58"  y="58" width="5" height="24" rx="2"/>
    <rect x="70"  y="52" width="5" height="36" rx="2"/>
    <rect x="82"  y="46" width="5" height="48" rx="2"/>
    <rect x="94"  y="38" width="5" height="64" rx="2"/>
    <rect x="106" y="50" width="5" height="40" rx="2"/>
    <rect x="118" y="34" width="5" height="72" rx="2"/>
    <rect x="130" y="42" width="5" height="56" rx="2"/>
    <rect x="142" y="28" width="5" height="84" rx="2"/>
    <rect x="154" y="36" width="5" height="68" rx="2"/>
    <rect x="166" y="22" width="5" height="96" rx="2"/>
    <rect x="178" y="32" width="5" height="76" rx="2"/>
    <rect x="190" y="18" width="5" height="104" rx="2"/>
    <rect x="202" y="26" width="5" height="88" rx="2"/>
    <rect x="214" y="18" width="5" height="104" rx="2"/>
    <rect x="226" y="30" width="5" height="80" rx="2"/>
    <rect x="238" y="16" width="5" height="108" rx="2"/>
    <rect x="250" y="28" width="5" height="84" rx="2"/>
    <rect x="262" y="22" width="5" height="96" rx="2"/>
    <rect x="274" y="34" width="5" height="72" rx="2"/>
    <rect x="286" y="20" width="5" height="100" rx="2"/>
    <rect x="298" y="32" width="5" height="76" rx="2"/>
    <rect x="310" y="26" width="5" height="88" rx="2"/>
    <rect x="322" y="40" width="5" height="60" rx="2"/>
    <rect x="334" y="30" width="5" height="80" rx="2"/>
    <rect x="346" y="44" width="5" height="52" rx="2"/>
    <rect x="358" y="36" width="5" height="68" rx="2"/>
    <rect x="370" y="50" width="5" height="40" rx="2"/>
    <rect x="382" y="42" width="5" height="56" rx="2"/>
    <rect x="394" y="54" width="5" height="32" rx="2"/>
    <rect x="406" y="60" width="5" height="20" rx="2"/>
    <rect x="418" y="64" width="5" height="12" rx="2"/>
  </g>

  <!-- Wordmark -->
  <text x="240" y="86" text-anchor="middle"
        font-family="'Bebas Neue', 'Oswald', 'Arial Narrow', Arial, sans-serif"
        font-size="54"
        font-weight="700"
        fill="#ffffff"
        letter-spacing="3">DJ LOVES ME</text>
</svg>
